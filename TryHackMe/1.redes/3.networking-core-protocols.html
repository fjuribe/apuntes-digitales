<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Networking Core Protocols — TryHackMe Room 3/4</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060f;--bg2:#0b0b1a;--bg3:#101025;
  --text:#e8e8f0;--muted:#a0a0b8;--dim:#707088;--faint:#505068;--dark:#353548;
  --border:rgba(255,255,255,0.06);
  --cyan:#00e5c8;--yellow:#ffd639;--pink:#f050a0;--purple:#a855f7;
  --blue:#3b9eff;--red:#ff5555;--green:#22d68a;--orange:#ff9030;
  --teal:#14b8a6;--sky:#38bdf8;--rose:#fb7185;
  --mono:'IBM Plex Mono',monospace;--ui:'Outfit',sans-serif;
}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--ui);line-height:1.6;overflow-x:hidden}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse 600px 400px at 20% 20%,rgba(0,229,200,0.025),transparent),radial-gradient(ellipse 500px 500px at 80% 80%,rgba(168,85,247,0.025),transparent);pointer-events:none;z-index:0}

.header{position:relative;background:linear-gradient(160deg,#08081a 0%,#12082a 40%,#081a20 100%);padding:30px 20px 22px;border-bottom:1px solid rgba(0,229,200,0.1);overflow:hidden}
.header::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent)}
.header-inner{max-width:920px;margin:0 auto;position:relative;z-index:1}
.header-tag{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:3px;text-transform:uppercase;opacity:.8}
.header h1{font-size:clamp(22px,4vw,28px);font-weight:900;margin:4px 0 2px;background:linear-gradient(90deg,var(--cyan),var(--blue),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{color:var(--faint);font-size:13px}
.room-badge{display:inline-block;background:var(--cyan);color:var(--bg);font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;margin-left:8px;vertical-align:middle}

.nav{background:rgba(6,6,15,0.97);border-bottom:1px solid var(--border);padding:10px 20px;overflow-x:auto;position:sticky;top:0;z-index:200;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.nav-inner{max-width:920px;margin:0 auto;display:flex;gap:4px;min-width:max-content}
.nav-btn{background:transparent;color:var(--faint);border:1px solid rgba(255,255,255,0.05);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .25s;font-family:var(--mono)}
.nav-btn:hover{color:var(--muted);border-color:rgba(255,255,255,0.12)}
.nav-btn.active{border:none;color:var(--bg)}
.content{max-width:920px;margin:0 auto;padding:24px 20px 100px;position:relative;z-index:1}
.sec-title{font-size:22px;font-weight:900;margin:0 0 4px}
.sec-sub{color:var(--faint);font-size:13px;margin-bottom:20px}

.box{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color .3s}
.terminal{background:#07070e;border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;margin:12px 0}
.term-bar{background:rgba(255,255,255,0.025);padding:6px 14px;font-size:10px;color:var(--faint);display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.term-dots{display:flex;gap:5px}
.term-dots span{width:9px;height:9px;border-radius:50%}
.terminal pre{padding:16px;margin:0;font-size:11.5px;line-height:1.7;font-family:var(--mono);color:var(--muted);overflow-x:auto;white-space:pre-wrap}
.cmd{color:#22d68a}.hl{color:#00e5c8}.warn{color:#ffd639}.ip{color:#f050a0}.srv{color:#3b9eff}.err{color:#ff5555}

.tip{border-left:3px solid;border-radius:0 12px 12px 0;padding:12px 16px;margin:12px 0;background:rgba(255,255,255,0.012)}
.tip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;font-family:var(--mono)}
.tip-body{color:var(--muted);font-size:13px;line-height:1.65}
.tip-body strong{color:var(--text)}
.tip-body code{font-family:var(--mono);background:rgba(0,229,200,0.08);color:var(--cyan);padding:1px 6px;border-radius:4px;font-size:11.5px}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.3px;display:inline-block}
.P{color:var(--muted);font-size:14px;line-height:1.8;margin:0 0 10px}
.P strong{color:var(--text)}
.P code{font-family:var(--mono);background:rgba(0,229,200,0.08);color:var(--cyan);padding:1px 6px;border-radius:4px;font-size:12px}
.H{font-weight:800;font-size:15px;margin-bottom:8px}
.expand-item{border:1.5px solid rgba(255,255,255,0.05);border-radius:12px;padding:13px 16px;cursor:pointer;transition:all .3s;background:rgba(255,255,255,0.01)}
.expand-item:hover{background:rgba(255,255,255,0.018)}
.tab-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tab-btn{border-radius:10px;padding:7px 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:var(--mono);transition:all .25s;border:1.5px solid}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.grid-200{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}
.flex-col{display:flex;flex-direction:column}
.gap-4{gap:4px}.gap-5{gap:5px}.gap-6{gap:6px}.gap-8{gap:8px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.dns-card{border-radius:10px;padding:14px 16px;border-left:3px solid;cursor:pointer;transition:transform .2s,background .3s;background:rgba(255,255,255,0.012);border:1px solid rgba(255,255,255,0.04);border-left:3px solid}
.dns-card:hover{transform:translateX(3px)}
.quiz-opt{background:rgba(255,255,255,0.02);border:2px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 18px;color:#ccc;font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:all .3s;width:100%;display:block;font-family:var(--ui)}
.quiz-opt:hover{border-color:rgba(255,255,255,0.15)}
.quiz-next{background:var(--orange);color:var(--bg);border:none;border-radius:12px;padding:12px 0;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--mono);display:block;width:100%;margin-top:18px}
.quiz-reset{background:var(--green);color:var(--bg);border:none;border-radius:12px;padding:12px 32px;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--mono)}
.port-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-left:3px solid;background:rgba(255,255,255,0.015);border-radius:0 8px 8px 0;transition:background .2s}
.port-row:hover{background:rgba(255,255,255,0.03)}
::-webkit-scrollbar{height:4px;width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
@media(max-width:600px){.grid-200{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
  <div class="header-tag">TryHackMe · Room 3/4</div>
  <h1>Networking Core Protocols <span class="room-badge">Room 3</span></h1>
  <p class="sub">DNS · WHOIS · HTTP · FTP · SMTP · POP3 · IMAP — Los protocolos que mueven Internet 🏴‍☠️</p>
</div></div>
<div class="nav"><div class="nav-inner" id="nav"></div></div>
<div class="content"><div id="sh"></div><div id="sc"></div></div>

<script>
const TABS=[
  {id:"intro",icon:"🏠",label:"Inicio",color:"#00e5c8"},
  {id:"dns",icon:"📖",label:"DNS",color:"#3b9eff"},
  {id:"whois",icon:"🔍",label:"WHOIS",color:"#a855f7"},
  {id:"http",icon:"🌐",label:"HTTP/S",color:"#22d68a"},
  {id:"ftp",icon:"📁",label:"FTP",color:"#ff9030"},
  {id:"smtp",icon:"📤",label:"SMTP",color:"#f050a0"},
  {id:"pop3imap",icon:"📥",label:"POP3/IMAP",color:"#ffd639"},
  {id:"flow",icon:"📨",label:"Flujo Email",color:"#14b8a6"},
  {id:"ports",icon:"🚪",label:"Puertos",color:"#38bdf8"},
  {id:"tools",icon:"🛠️",label:"Tools",color:"#84cc16"},
  {id:"quiz",icon:"🧠",label:"Quiz",color:"#ff9030"},
];
const QS=[
  {q:"¿En qué puerto opera DNS por defecto?",o:["80","443","53","25"],c:2},
  {q:"¿Qué registro DNS mapea un hostname a IPv4?",o:["AAAA","CNAME","MX","A"],c:3},
  {q:"¿Qué registro DNS indica el servidor de correo?",o:["A","MX","CNAME","TXT"],c:1},
  {q:"¿En qué puerto opera WHOIS?",o:["53","80","43","25"],c:2},
  {q:"¿Qué puerto usa HTTP?",o:["443","8080","80","21"],c:2},
  {q:"¿Qué puerto usa HTTPS?",o:["80","443","8443","22"],c:1},
  {q:"¿HTTP es stateful o stateless?",o:["Stateful","Stateless"],c:1},
  {q:"¿Qué método HTTP se usa para enviar datos de un formulario?",o:["GET","POST","PUT","HEAD"],c:1},
  {q:"¿FTP usa cuántos canales de comunicación?",o:["1","2","3","4"],c:1},
  {q:"¿En qué puerto escucha el canal de control de FTP?",o:["20","21","22","25"],c:1},
  {q:"¿Qué protocolo se usa para ENVIAR emails?",o:["POP3","IMAP","SMTP","FTP"],c:2},
  {q:"¿En qué puerto opera SMTP?",o:["110","143","25","587"],c:2},
  {q:"¿POP3 escucha en qué puerto?",o:["25","110","143","993"],c:1},
  {q:"¿IMAP escucha en qué puerto?",o:["25","110","143","993"],c:2},
  {q:"¿Qué protocolo DESCARGA emails y los borra del servidor?",o:["SMTP","IMAP","POP3","DNS"],c:2},
  {q:"¿Qué protocolo sincroniza emails en múltiples dispositivos?",o:["POP3","SMTP","IMAP","FTP"],c:2},
  {q:"¿Qué comando SMTP indica el inicio del contenido del email?",o:["HELO","MAIL FROM","RCPT TO","DATA"],c:3},
  {q:"¿AAAA record es para...?",o:["IPv4","IPv6","Mail","Alias"],c:1},
  {q:"¿Qué código HTTP significa 'Not Found'?",o:["200","301","403","404"],c:3},
  {q:"¿Qué comando FTP descarga un archivo del servidor?",o:["STOR","LIST","RETR","PASV"],c:2},
];

let activeTab="intro",dnsOpen=null,httpTab="methods",expState={};
let qCur=0,qSel=null,qAns=false,qScore=0,qDone=false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function badge(t,c){return `<span class="badge" style="background:${c}18;color:${c}">${t}</span>`}
function box(h,g,x=""){return `<div class="box" style="${g?`border-color:${g}35;box-shadow:0 0 25px ${g}08;`:''}${x}">${h}</div>`}
function term(c,t="Terminal"){return `<div class="terminal"><div class="term-bar"><span class="term-dots"><span style="background:#ff5f57"></span><span style="background:#febc2e"></span><span style="background:#28c840"></span></span>${t}</div><pre>${c}</pre></div>`}
function tip(type,body){const s={tip:{i:"💡",c:"#ffd639",l:"Tip"},hacker:{i:"🏴‍☠️",c:"#ff5555",l:"Nota Hacker"},key:{i:"🔑",c:"#22d68a",l:"Concepto Clave"},warn:{i:"⚠️",c:"#ff9030",l:"Atención"},deep:{i:"🔬",c:"#a855f7",l:"Profundizar"},exam:{i:"📝",c:"#3b9eff",l:"Para el examen"}}[type]||{i:"💡",c:"#ffd639",l:"Tip"};return `<div class="tip" style="background:${s.c}06;border-left-color:${s.c}"><div class="tip-label" style="color:${s.c}">${s.i} ${s.l}</div><div class="tip-body">${body}</div></div>`}
function tabBar(tabs,act,fn){return `<div class="tab-bar">${tabs.map(t=>`<button class="tab-btn" onclick="${fn}('${t.id}')" style="background:${act===t.id?t.color:'transparent'};color:${act===t.id?'var(--bg)':t.color};border-color:${t.color}">${t.label}</button>`).join("")}</div>`}
function accordion(items,color,group){return `<div class="flex-col gap-5">${items.map((it,i)=>{const open=expState[group]===i;return `<div class="expand-item" onclick="toggleExp('${group}',${i})" style="background:${open?color+'0a':''};border-color:${open?color+'50':'rgba(255,255,255,0.05)'}"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px">${it.icon?`<span style="font-size:18px">${it.icon}</span>`:''}<div><div style="color:#fff;font-weight:700;font-size:14px">${it.title}</div>${it.sub?`<div style="color:var(--faint);font-size:11px;margin-top:2px">${it.sub}</div>`:''}</div></div><span style="color:var(--dark)">${open?"▲":"▼"}</span></div>${open?`<div style="margin-top:12px">${it.content}</div>`:''}</div>`}).join("")}</div>`}
function toggleExp(g,i){expState[g]=expState[g]===i?null:i;render()}

function renderNav(){document.getElementById("nav").innerHTML=TABS.map(t=>{const a=activeTab===t.id;return `<button class="nav-btn ${a?'active':''}" style="${a?`background:${t.color};`:''}" onclick="setTab('${t.id}')">${t.icon} ${t.label}</button>`}).join("")}
function setTab(id){activeTab=id;renderNav();render();window.scrollTo({top:0,behavior:'smooth'})}
function render(){
  const t=TABS.find(x=>x.id===activeTab);
  document.getElementById("sh").innerHTML=`<h2 class="sec-title" style="color:${t.color}">${t.icon} ${t.label}</h2><p class="sec-sub">${({intro:"Bienvenido al Room 3 de Networking",dns:"Domain Name System — La guía telefónica de Internet",whois:"Consulta pública de datos de registro de dominios",http:"HyperText Transfer Protocol — La base de la web",ftp:"File Transfer Protocol — Transferencia de archivos",smtp:"Simple Mail Transfer Protocol — Enviar correos",pop3imap:"Protocolos para recibir y leer correos",flow:"El viaje completo de un email de punta a punta",ports:"Tabla resumen de todos los puertos del room",tools:"Tu kit de herramientas para este room",quiz:"20 preguntas — ¿Cuánto aprendiste?"})[t.id]||""}</p>`;
  document.getElementById("sc").innerHTML=({intro:rIntro,dns:rDNS,whois:rWHOIS,http:rHTTP,ftp:rFTP,smtp:rSMTP,pop3imap:rPOP3,flow:rFlow,ports:rPorts,tools:rTools,quiz:rQuiz})[activeTab]();
}

// ══════ INTRO ══════
function rIntro(){
  const topics=[{icon:"📖",t:"DNS",d:"Traduce nombres a IPs",c:"#3b9eff",port:"53"},{icon:"🔍",t:"WHOIS",d:"¿Quién registró este dominio?",c:"#a855f7",port:"43"},{icon:"🌐",t:"HTTP/S",d:"La base de toda la web",c:"#22d68a",port:"80/443"},{icon:"📁",t:"FTP",d:"Transferencia de archivos",c:"#ff9030",port:"21"},{icon:"📤",t:"SMTP",d:"Envío de correos",c:"#f050a0",port:"25"},{icon:"📥",t:"POP3",d:"Descargar correos",c:"#ffd639",port:"110"},{icon:"📥",t:"IMAP",d:"Sincronizar correos",c:"#14b8a6",port:"143"}];
  return `<p class="P">Bienvenido al <strong style="color:var(--cyan)">tercer room</strong> de la serie de networking de TryHackMe. Aquí aprenderás los <strong>protocolos de la Capa de Aplicación</strong> (Layer 7 del modelo OSI) que usas a diario sin darte cuenta: navegar la web, enviar emails, transferir archivos y consultar dominios.</p>
  <div class="grid-auto mt-16 mb-20">${topics.map(t=>box(`<div style="font-size:26px;margin-bottom:6px">${t.icon}</div><div style="color:${t.c};font-weight:800;font-size:14px">${t.t}</div><div style="color:var(--dim);font-size:11px;margin-top:2px">${t.d}</div><div style="margin-top:6px">${badge("Puerto "+t.port,t.c)}</div>`,t.c)).join("")}</div>
  ${tip("key",'<strong>Prerrequisitos:</strong> Modelo OSI, TCP/IP, direcciones IP, Ethernet, IP y TCP (rooms anteriores: Networking Concepts + Networking Essentials).')}
  ${tip("exam",'<strong>TODOS estos protocolos operan en Capa 7 (Aplicación)</strong> del OSI. Memoriza sus puertos — aparecen en CTFs, certificaciones y exámenes constantemente.')}
  ${box(`<div style="color:var(--cyan);font-weight:700;font-size:13px;margin-bottom:8px">📚 Serie completa de rooms</div>${["1. Networking Concepts ✅","2. Networking Essentials ✅","3. Networking Core Protocols ← Estás aquí","4. Networking Secure Protocols"].map((r,i)=>`<div style="color:${i===2?'var(--cyan)':'var(--faint)'};font-size:13px;padding:3px 0;font-weight:${i===2?700:400};font-family:var(--mono)">${r}</div>`).join("")}`,"var(--cyan)","margin-top:16px;")}`;
}

// ══════ DNS ══════
function rDNS(){
  const recs=[
    {type:"A",c:"#3b9eff",full:"Address Record",desc:"Mapea un hostname a una <strong>dirección IPv4</strong>.",ex:"example.com → 93.184.215.14",detail:"Es el registro más común. Cuando escribes una URL, el DNS busca el registro A para encontrar la IP del servidor."},
    {type:"AAAA",c:"#a855f7",full:"Quad-A Record",desc:"Mapea un hostname a una <strong>dirección IPv6</strong>.",ex:"example.com → 2606:2800:21f:cb07:...",detail:"Igual que A pero para IPv6 (128 bits). Se llama AAAA porque IPv6 es 4 veces más largo que IPv4. <strong>No confundir</strong> con AA (baterías) ni AAA (Authentication, Authorization, Accounting)."},
    {type:"CNAME",c:"#22d68a",full:"Canonical Name",desc:"Mapea un dominio a <strong>otro dominio</strong> (alias).",ex:"www.example.com → example.com",detail:"Crea un alias. Útil para que múltiples subdominios apunten al mismo lugar. Ej: www.example.com y blog.example.com pueden apuntar a example.com."},
    {type:"MX",c:"#f050a0",full:"Mail Exchange",desc:"Indica el <strong>servidor de correo</strong> responsable del dominio.",ex:"example.com → mail.example.com (prioridad 10)",detail:"Cuando envías un email a user@example.com, el servidor consulta el MX record para saber a dónde entregar el mensaje. Puede haber varios con diferentes prioridades (el número menor = mayor prioridad)."},
    {type:"TXT",c:"#ffd639",full:"Text Record",desc:"Almacena <strong>texto arbitrario</strong> para verificación y seguridad.",ex:'v=spf1 include:_spf.google.com ~all',detail:"Se usa para SPF (anti-spoofing), DKIM (firma digital de emails), DMARC y verificación de propiedad de dominio."},
    {type:"NS",c:"#ff9030",full:"Name Server",desc:"Indica los <strong>servidores DNS autoritativos</strong> del dominio.",ex:"example.com → ns1.example.com",detail:"Define quién tiene la autoridad final sobre los registros DNS. Si cambias de proveedor de hosting, actualizas los NS records."},
  ];
  const cards=recs.map((r,i)=>{const open=dnsOpen===i;return `<div class="dns-card" onclick="toggleDNS(${i})" style="border-left-color:${r.c};${open?`background:${r.c}0a;border-color:${r.c}40;`:''}"><div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px">${badge(r.type,r.c)}<div><div style="color:var(--text);font-weight:700;font-size:14px">${r.full}</div><div style="color:var(--dim);font-size:12px;margin-top:2px">${r.desc}</div></div></div><span style="color:var(--dark)">${open?"▲":"▼"}</span></div>${open?`<div style="margin-top:12px"><p class="P">${r.detail}</p><div style="background:rgba(0,0,0,0.3);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:${r.c}">${esc(r.ex)}</div></div>`:''}</div>`}).join("");

  return `<p class="P">¿Recuerdas las IPs de tus sitios favoritos? Nadie las memoriza gracias a <strong style="color:#3b9eff">DNS</strong> (Domain Name System). DNS traduce nombres de dominio legibles a direcciones IP que los computadores entienden.</p>
  ${box(`<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center"><div style="text-align:center"><div style="font-size:28px">🌐</div><div style="color:var(--muted);font-size:11px;margin-top:4px">www.example.com</div></div><div style="color:var(--blue);font-size:18px;font-family:var(--mono)">→ DNS →</div><div style="text-align:center"><div style="font-size:28px">📍</div><div style="color:var(--pink);font-size:11px;margin-top:4px;font-family:var(--mono)">93.184.215.14</div></div></div>`,"#3b9eff","text-align:center;padding:24px;")}
  ${tip("key",'DNS opera en <strong>Capa 7 (Aplicación)</strong>. Usa <strong>UDP puerto 53</strong> por defecto y <strong>TCP puerto 53</strong> como fallback (respuestas grandes o transferencias de zona).')}
  <div class="mt-20 mb-12"><div class="H" style="color:#3b9eff">📋 Tipos de registros DNS — haz clic para expandir</div></div>
  <div class="flex-col gap-6">${cards}</div>
  <div class="mt-20"><div class="H" style="color:#3b9eff">🔬 En la práctica: nslookup</div></div>
  <p class="P">El comando <code>nslookup</code> permite consultar DNS desde la terminal. Observa cómo devuelve tanto la IPv4 (A record) como la IPv6 (AAAA record):</p>
  ${term(`<span class="cmd">$</span> nslookup www.example.com
Server:         127.0.0.53
Address:        127.0.0.53#53

Non-authoritative answer:
Name:   www.example.com

// ══════ HTTP ══════
function rHTTP(){
  let content="";
  if(httpTab==="methods"){
    content=`<div class="flex-col gap-5">${[

      {m:"HEAD",c:"#a855f7",d:"Igual que GET pero solo devuelve headers (sin body).",use:"Verificar si un recurso existe"},

      {r:"3xx",l:"Redirección 🔄",c:"#ffd639",codes:[[301,"Moved Permanently"],[302,"Found (Temporal)"],[304,"Not Modified"]]},
      {r:"4xx",l:"Error del cliente ❌",c:"#ff9030",codes:[[400,"Bad Request"],[401,"Unauthorized"],[403,"Forbidden"],[404,"Not Found"],[429,"Too Many Requests"]]},
      {r:"5xx",l:"Error del servidor 💥",c:"#ff5555",codes:[[500,"Internal Server Error"],[502,"Bad Gateway"],[503,"Service Unavailable"]]},
    ];
    content=groups.map(g=>`<div class="mb-16"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${badge(g.r,g.c)}<span style="color:${g.c};font-weight:700;font-size:13px">${g.l}</span></div><div class="flex-col gap-4">${g.codes.map(([n,d])=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 12px;border-left:2px solid ${g.c};background:rgba(255,255,255,0.015);border-radius:0 8px 8px 0"><span style="color:${g.c};font-weight:900;font-family:var(--mono);font-size:14px;min-width:36px">${n}</span><span style="color:var(--muted);font-size:12px">${d}</span></div>`).join("")}</div></div>`).join("");
  } else {
    content=`<p class="P"><strong>HTTPS</strong> = HTTP + <strong style="color:#22d68a">TLS/SSL</strong>. El tráfico viaja cifrado entre el navegador y el servidor.</p><div class="grid-200 mt-12">${[{l:"HTTP",p:"80",s:"❌ Sin cifrar — cualquiera puede leer el tráfico",c:"#ff5555"},{l:"HTTPS",p:"443",s:"✅ Cifrado TLS — protege contra interceptación",c:"#22d68a"}].map(p=>`<div style="background:rgba(255,255,255,0.02);border:2px solid ${p.c}30;border-radius:12px;padding:16px;text-align:center"><div style="color:${p.c};font-weight:900;font-size:18px">${p.l}</div><div style="color:var(--muted);font-family:var(--mono);font-size:14px;margin-top:6px">Puerto ${p.p}</div><div style="color:var(--dim);font-size:12px;margin-top:4px">${p.s}</div></div>`).join("")}</div>${tip("warn",'Con HTTP plano, herramientas como Wireshark pueden ver <strong>todo</strong>: URLs, cookies, credenciales. HTTPS cifra esta comunicación.')}`;
  }
  return `<p class="P">Cuando abres tu navegador, usas <strong style="color:#22d68a">HTTP</strong> (HyperText Transfer Protocol). Tu navegador envía <strong>requests</strong> al servidor web y recibe <strong>responses</strong> con el contenido de la página.</p>
  ${tip("key",'HTTP usa <strong>TCP puerto 80</strong> y HTTPS usa <strong>TCP puerto 443</strong>. Puertos alternativos: 8080 y 8443. HTTP es <strong>stateless</strong> — cada request es independiente.')}

  <div class="mt-20"><div class="H" style="color:#ffd639">📥 POP3 — Comandos y sesión del room</div></div>
  <div class="flex-col gap-4 mb-12">${[{cmd:"USER <username>",d:"Identifica al usuario"},{cmd:"PASS <password>",d:"Envía la contraseña"},{cmd:"STAT",d:"Número de mensajes y tamaño total"},{cmd:"LIST",d:"Lista todos los mensajes y sus tamaños"},{cmd:"RETR <n>",d:"Descarga el mensaje número n"},{cmd:"DELE <n>",d:"Marca mensaje para eliminación"},{cmd:"QUIT",d:"Cierra sesión (aplica eliminaciones)"}].map(c=>`<div style="padding:5px 10px;border-left:2px solid #ffd639;background:rgba(255,255,255,0.015);border-radius:0 6px 6px 0"><code style="color:#ffd639;background:transparent;font-size:11px">${esc(c.cmd)}</code> <span style="color:var(--dim);font-size:11px">— ${c.d}</span></div>`).join("")}</div>
  ${term(`<span class="cmd">$</span> telnet MACHINE_IP 110
<span class="srv">+OK [XCLIENT] Dovecot (Ubuntu) ready.</span>
<span class="err">USER strategos</span>
<span class="srv">+OK</span>
<span class="err">PASS [password]</span>

<span class="srv">From: user@client.thm</span>

<span class="srv">Hello. I am using telnet to send you an email!</span>
<span class="err">QUIT</span>
<span class="srv">+OK Logging out.</span>`,"POP3 — Sesión vía telnet (del room)")}

  <div class="mt-20"><div class="H" style="color:#14b8a6">🔄 IMAP — Comandos y sesión del room</div></div>
  <p class="P">IMAP usa <strong>prefijos de comando</strong> (A, B, C, D...) para identificar cada operación:</p>
  <div class="flex-col gap-4 mb-12">${[{cmd:"LOGIN user pass",d:"Autenticación"},{cmd:"SELECT inbox",d:"Selecciona el buzón de entrada"},{cmd:"FETCH n body[]",d:"Descarga el mensaje n completo"},{cmd:"MOVE <set> <mailbox>",d:"Mueve mensajes a otro buzón"},{cmd:"COPY <set> <mailbox>",d:"Copia mensajes a otro buzón"},{cmd:"LOGOUT",d:"Cierra sesión"}].map(c=>`<div style="padding:5px 10px;border-left:2px solid #14b8a6;background:rgba(255,255,255,0.015);border-radius:0 6px 6px 0"><code style="color:#14b8a6;background:transparent;font-size:11px">${esc(c.cmd)}</code> <span style="color:var(--dim);font-size:11px">— ${c.d}</span></div>`).join("")}</div>
  ${term(`<span class="cmd">$</span> telnet MACHINE_IP 143
<span class="srv">* OK [CAPABILITY IMAP4rev1 ...] Dovecot (Ubuntu) ready.</span>
<span class="err">A LOGIN strategos [password]</span>
<span class="srv">A OK [...] Logged in</span>

<span class="srv">* 0 RECENT</span>
<span class="srv">* OK [UNSEEN 2] First unseen.</span>

<span class="srv">* 3 FETCH (BODY[] {445}</span>
<span class="srv">From: user@client.thm</span>

<span class="srv">)</span>

<span class="err">D LOGOUT</span>
<span class="srv">* BYE Logging out</span>
<span class="srv">D OK Logout completed.</span>`,"IMAP — Sesión vía telnet (del room)")}
  ${tip("key",'<strong>POP3 = un dispositivo</strong>, descarga y borra. <strong>IMAP = múltiples dispositivos</strong>, sincroniza y mantiene en servidor. Si usas Gmail/Outlook en tu PC y celular, estás usando IMAP.')}
  ${tip("warn",'Tanto POP3 como IMAP transmiten credenciales en <strong>texto plano</strong>. Las versiones seguras son POP3S (puerto 995) e IMAPS (puerto 993), que usan TLS.')}`;
}

// ══════ FLOW ══════
function rFlow(){
  return `<p class="P">Veamos el <strong>viaje completo</strong> de un email, desde que lo envías hasta que el destinatario lo lee. Esto conecta todos los protocolos de email que aprendimos.</p>
  ${box(`<div class="H" style="color:#14b8a6">📨 El viaje de un email paso a paso</div>
  <div class="flex-col gap-8 mt-12">${[
    {n:1,icon:"✍️",title:"Tú escribes el email",desc:"Redactas el mensaje en tu cliente (Gmail, Outlook, Thunderbird...).",c:"#3b9eff"},
    {n:2,icon:"📤",title:"SMTP: Tu cliente → Tu servidor de correo",desc:"Tu cliente usa <strong>SMTP (puerto 25/587)</strong> para enviar el email a tu servidor de correo saliente.",c:"#f050a0"},
    {n:3,icon:"📖",title:"DNS: Buscar el MX record del destinatario",desc:"Tu servidor consulta <strong>DNS</strong> para encontrar el registro <strong>MX</strong> del dominio del destinatario.",c:"#3b9eff"},
    {n:4,icon:"📨",title:"SMTP: Tu servidor → Servidor del destinatario",desc:"Tu servidor envía el email al servidor de correo del destinatario vía <strong>SMTP</strong>.",c:"#f050a0"},
    {n:5,icon:"📬",title:"El email queda en el servidor del destinatario",desc:"El mensaje se almacena en el buzón del destinatario esperando ser leído.",c:"#22d68a"},
    {n:6,icon:"📥",title:"POP3 o IMAP: El destinatario lee el email",desc:"El destinatario usa <strong>POP3 (puerto 110)</strong> para descargar o <strong>IMAP (puerto 143)</strong> para sincronizar.",c:"#ffd639"},
  ].map(s=>`<div style="display:flex;gap:12px;align-items:flex-start"><div style="background:${s.c};color:var(--bg);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0">${s.n}</div><div><div style="color:var(--text);font-weight:700;font-size:14px">${s.icon} ${s.title}</div><div style="color:var(--muted);font-size:13px;margin-top:4px;line-height:1.6">${s.desc}</div></div></div>`).join("")}</div>`,"#14b8a6")}
  ${tip("exam",'Resumen: <strong>SMTP envía</strong> (puerto 25), <strong>DNS encuentra</strong> el servidor (MX record), <strong>POP3 descarga</strong> (puerto 110) o <strong>IMAP sincroniza</strong> (puerto 143).')}
  ${tip("deep",'Investiga los headers de un email real (en Gmail: "Show original"). Verás los servidores por los que pasó, las verificaciones SPF/DKIM/DMARC, y las IPs de origen.')}`;
}

// ══════ PORTS ══════
function rPorts(){
  const ports=[
    {proto:"TELNET",transport:"TCP",port:23,c:"#ff5555"},
    {proto:"DNS",transport:"UDP/TCP",port:53,c:"#3b9eff"},
    {proto:"HTTP",transport:"TCP",port:80,c:"#22d68a"},
    {proto:"HTTPS",transport:"TCP",port:443,c:"#22d68a"},
    {proto:"FTP (control)",transport:"TCP",port:21,c:"#ff9030"},
    {proto:"FTP (datos)",transport:"TCP",port:20,c:"#ff9030"},
    {proto:"SMTP",transport:"TCP",port:25,c:"#f050a0"},
    {proto:"POP3",transport:"TCP",port:110,c:"#ffd639"},
    {proto:"IMAP",transport:"TCP",port:143,c:"#14b8a6"},
    {proto:"WHOIS",transport:"TCP",port:43,c:"#a855f7"},
  ];
  return `<p class="P">Esta tabla resume <strong>todos los puertos</strong> cubiertos en este room. Es fundamental memorizarlos para exámenes, CTFs y pentesting.</p>
  <div class="flex-col gap-4 mt-16">${ports.map(p=>`<div class="port-row" style="border-left-color:${p.c}">
    <span style="color:${p.c};font-weight:900;font-family:var(--mono);font-size:18px;min-width:42px">${p.port}</span>
    <div style="flex:1"><div style="color:var(--text);font-weight:700;font-size:14px">${p.proto}</div></div>
    ${badge(p.transport,p.c)}
  </div>`).join("")}</div>
  ${tip("exam",'Truco mnemotécnico para los puertos de email: <strong>25</strong> (enviar/SMTP) → <strong>110</strong> (POP3/descargar) → <strong>143</strong> (IMAP/sincronizar). Los seguros son 465/587, 995 y 993 respectivamente.')}
  ${tip("key",'Puertos 0-1023 son <strong>well-known ports</strong> (reservados). 1024-49151 son <strong>registrados</strong>. 49152-65535 son <strong>dinámicos/efímeros</strong>.')}`;
}

// ══════ QUIZ ══════
function rQuiz(){
  if(qDone){const pct=Math.round(qScore/QS.length*100);const emoji=pct>=80?"🏆":pct>=60?"👍":"📚";const color=pct>=80?"#22d68a":pct>=60?"#ffd639":"#ff5555";const msg=pct>=80?"¡Excelente! Dominas los Core Protocols.":pct>=60?"¡Bien! Repasa las secciones donde fallaste.":"Sigue estudiando, ¡vuelve a intentarlo!";return `<div style="text-align:center;padding:30px 0"><div style="font-size:60px">${emoji}</div><div style="font-size:36px;font-weight:900;font-family:var(--mono);color:${color}">${qScore}/${QS.length} (${pct}%)</div><div style="color:var(--muted);font-size:14px;margin:8px 0 24px">${msg}</div><button class="quiz-reset" onclick="resetQ()">Reintentar</button></div>`}
  const q=QS[qCur];const pct=((qCur+1)/QS.length*100);
  const opts=q.o.map((o,i)=>{let bg="rgba(255,255,255,0.02)",bd="rgba(255,255,255,0.06)",cl="#ccc";if(qAns&&i===q.c){bg="#22d68a15";bd="#22d68a";cl="#22d68a"}else if(qAns&&i===qSel){bg="#ff555515";bd="#ff5555";cl="#ff5555"}return `<button class="quiz-opt" style="background:${bg};border-color:${bd};color:${cl};cursor:${qAns?'default':'pointer'}" onclick="pickQ(${i})">${o}</button>`}).join("");
  return `<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:var(--dim);font-family:var(--mono);font-size:12px">${qCur+1}/${QS.length}</span><span style="color:#22d68a;font-family:var(--mono);font-size:12px">Score: ${qScore}</span></div><div style="background:rgba(255,255,255,0.04);height:3px;border-radius:3px;margin-bottom:18px;overflow:hidden"><div style="background:var(--orange);height:100%;width:${pct}%;transition:width .4s"></div></div><h3 style="color:#fff;font-size:16px;font-weight:700;margin-bottom:16px">${q.q}</h3><div class="flex-col gap-8">${opts}</div>${qAns?`<button class="quiz-next" onclick="nextQ()">${qCur+1>=QS.length?"Ver resultados":"Siguiente →"}</button>`:''}`;
}
function pickQ(i){if(qAns)return;qSel=i;qAns=true;if(i===QS[qCur].c)qScore++;render()}
function nextQ(){if(qCur+1>=QS.length)qDone=true;else{qCur++;qSel=null;qAns=false}render()}
function resetQ(){qCur=0;qSel=null;qAns=false;qScore=0;qDone=false;render()}

renderNav();render();
</script>
