let currentModule = 0;
let currentSlide = 0;

function getTotalSlides() {
    return modules.reduce((acc, m) => acc + m.slides.length, 0);
}

function getCurrentSlideNum() {
    let count = 0;
    for (let i = 0; i < currentModule; i++) count += modules[i].slides.length;
    return count + currentSlide + 1;
}

function render() {
    const mod = modules[currentModule];
    const slide = mod.slides[currentSlide];
    
    document.getElementById('moduleNav').innerHTML = modules.map((m, i) => 
        `<button class="module-btn ${i === currentModule ? 'active' : ''}" data-color="${m.color}" onclick="goModule(${i})">${m.icon} ${m.title}</button>`
    ).join('');
    
    const header = document.getElementById('slideHeader');
    header.setAttribute('data-color', mod.color);
    document.getElementById('slideIcon').textContent = mod.icon;
    document.getElementById('slideMeta').textContent = `Módulo ${currentModule + 1} • Slide ${currentSlide + 1}/${mod.slides.length}`;
    document.getElementById('slideTitle').textContent = slide.title;
    
    document.getElementById('slideContent').innerHTML = slide.html;
    
    document.getElementById('dots').innerHTML = mod.slides.map((_, i) => 
        `<button class="dot ${i === currentSlide ? 'active' : ''}" onclick="goSlide(${i})"></button>`
    ).join('');
    
    document.getElementById('refBtns').innerHTML = mod.slides.map((s, i) => 
        `<button class="ref-btn ${i === currentSlide ? 'active' : ''}" onclick="goSlide(${i})">${s.title}</button>`
    ).join('');
    
    document.getElementById('progress').textContent = Math.round((getCurrentSlideNum() / getTotalSlides()) * 100) + '%';
    
    document.getElementById('prevBtn').disabled = currentModule === 0 && currentSlide === 0;
    document.getElementById('nextBtn').disabled = currentModule === modules.length - 1 && currentSlide === mod.slides.length - 1;
}

function nextSlide() {
    const mod = modules[currentModule];
    if (currentSlide < mod.slides.length - 1) {
        currentSlide++;
    } else if (currentModule < modules.length - 1) {
        currentModule++;
        currentSlide = 0;
    }
    render();
}

function prevSlide() {
    if (currentSlide > 0) {
        currentSlide--;
    } else if (currentModule > 0) {
        currentModule--;
        currentSlide = modules[currentModule].slides.length - 1;
    }
    render();
}

function goSlide(i) { currentSlide = i; render(); }
function goModule(i) { currentModule = i; currentSlide = 0; render(); }

function switchTab(tabsId, contentId, index) {
    const tabs = document.getElementById(tabsId).querySelectorAll('.tab');
    const contents = document.getElementById(contentId).querySelectorAll('.tab-content');
    tabs.forEach((t, i) => t.classList.toggle('active', i === index));
    contents.forEach((c, i) => c.classList.toggle('active', i === index));
}

function toggleReveal(id) {
    const el = document.getElementById(id);
    el.classList.toggle('show');
}

document.getElementById('prevBtn').onclick = prevSlide;
document.getElementById('nextBtn').onclick = nextSlide;

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
    if (e.key === 'ArrowLeft') prevSlide();
});

render();
