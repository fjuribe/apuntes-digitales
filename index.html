<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apuntes Digitales</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080b12;
      --surface: #0f1520;
      --s2:      #161e2e;
      --border:  #1c2840;
      --border2: #243050;
      --cyan:    #06d6f5;
      --green:   #10f5a0;
      --purple:  #a78bfa;
      --pink:    #f472b6;
      --yellow:  #ffd166;
      --text:    #dce8f5;
      --muted:   #4a6080;
      --muted2:  #7a90b0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background:
        radial-gradient(ellipse 800px 400px at 10% 20%, rgba(6,214,245,.04) 0%, transparent 60%),
        radial-gradient(ellipse 600px 400px at 90% 80%, rgba(167,139,250,.04) 0%, transparent 60%);
      pointer-events:none; z-index:0;
    }
    body::after {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(6,214,245,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,214,245,.022) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events:none; z-index:0;
    }

    .page {
      position:relative; z-index:1;
      max-width: 860px;
      margin: 0 auto;
      padding: 52px 24px 80px;
    }

    /* ── HEADER ── */
    header { margin-bottom: 52px; animation: fadeDown .55s ease both; }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .eyebrow {
      font-family:'JetBrains Mono', monospace;
      font-size:10px; letter-spacing:5px;
      color:var(--cyan); opacity:.6;
      text-transform:uppercase; margin-bottom:12px;
    }
    h1 {
      font-family:'Syne', sans-serif;
      font-size: clamp(2rem,5vw,3.4rem);
      font-weight:800; letter-spacing:-2px; line-height:1;
      background: linear-gradient(100deg,#fff 25%,var(--cyan) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .header-sub {
      margin-top:12px;
      color:var(--muted2); font-size:13.5px; line-height:1.7;
      max-width:460px;
    }

    /* ── ACCORDION ── */
    .accordion { display:flex; flex-direction:column; gap:10px; }

    .acc-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color .25s ease;
      animation: fadeUp .45s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .acc-item.open.color-cyan   { border-color: rgba(6,214,245,.3); }
    .acc-item.open.color-purple { border-color: rgba(167,139,250,.3); }
    .acc-item.open.color-pink   { border-color: rgba(244,114,182,.3); }
    .acc-item.open.color-green  { border-color: rgba(16,245,160,.3); }
    .acc-item.open.color-yellow { border-color: rgba(255,209,102,.3); }

    .acc-trigger {
      width:100%; background: var(--surface);
      border:none; cursor:pointer;
      padding: 18px 22px;
      display:flex; align-items:center; gap:14px;
      transition: background .2s ease; text-align:left;
    }
    .acc-trigger:hover { background: var(--s2); }
    .acc-item.open .acc-trigger { background: var(--s2); }

    .acc-icon {
      width:38px; height:38px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:17px; flex-shrink:0;
    }
    .color-cyan   .acc-icon { background:rgba(6,214,245,.1);   border:1px solid rgba(6,214,245,.2); }
    .color-purple .acc-icon { background:rgba(167,139,250,.1); border:1px solid rgba(167,139,250,.2); }
    .color-pink   .acc-icon { background:rgba(244,114,182,.1); border:1px solid rgba(244,114,182,.2); }
    .color-green  .acc-icon { background:rgba(16,245,160,.1);  border:1px solid rgba(16,245,160,.2); }
    .color-yellow .acc-icon { background:rgba(255,209,102,.1); border:1px solid rgba(255,209,102,.2); }

    .acc-meta { flex:1; min-width:0; }

    .acc-title {
      font-family:'Syne', sans-serif;
      font-size:.98rem; font-weight:700;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .color-cyan   .acc-title { color:var(--cyan); }
    .color-purple .acc-title { color:var(--purple); }
    .color-pink   .acc-title { color:var(--pink); }
    .color-green  .acc-title { color:var(--green); }
    .color-yellow .acc-title { color:var(--yellow); }

    .acc-subtitle {
      font-family:'JetBrains Mono', monospace;
      font-size:9.5px; letter-spacing:2px;
      color:var(--muted); text-transform:uppercase; margin-top:2px;
    }

    .acc-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }

    .acc-count {
      font-family:'JetBrains Mono', monospace;
      font-size:10px; color:var(--muted);
    }

    .acc-chevron {
      width:22px; height:22px; border-radius:6px;
      background:var(--border);
      display:flex; align-items:center; justify-content:center;
      transition: transform .3s ease, background .2s ease;
      color:var(--muted2); font-size:11px;
    }
    .acc-item.open .acc-chevron { transform:rotate(180deg); background:var(--border2); }

    .acc-body { max-height:0; overflow:hidden; transition:max-height .4s cubic-bezier(.4,0,.2,1); }
    .acc-item.open .acc-body { max-height:9999px; }

    .acc-inner { padding:6px 22px 20px; border-top:1px solid var(--border); }

    /* ── SUBFOLDER separator ── */
    .subfolder-label {
      font-family:'JetBrains Mono', monospace;
      font-size:9px; letter-spacing:3px; text-transform:uppercase;
      color:var(--muted); margin:18px 0 10px 4px;
      display:flex; align-items:center; gap:8px;
    }
    .subfolder-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── ROADMAP ── */
    .roadmap {
      position:relative; display:flex; flex-direction:column; padding-top:16px;
    }
    .roadmap::before {
      content:''; position:absolute;
      left:23px; top:32px; bottom:16px; width:1px;
      background:linear-gradient(to bottom, var(--border2) 80%, transparent);
    }

    .step {
      display:flex; gap:16px; align-items:flex-start;
      position:relative; z-index:1; margin-bottom:10px;
    }

    .step-num {
      width:46px; height:46px; border-radius:10px;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:'JetBrains Mono', monospace;
      flex-shrink:0; border:1px solid var(--border2);
      transition:transform .2s ease;
    }
    .step:hover .step-num { transform:scale(1.07); }

    .lv-0 .step-num { background:rgba(16,245,160,.1);  border-color:rgba(16,245,160,.3);  color:var(--green); }
    .lv-1 .step-num { background:rgba(6,214,245,.1);   border-color:rgba(6,214,245,.3);   color:var(--cyan); }
    .lv-2 .step-num { background:rgba(255,209,102,.1); border-color:rgba(255,209,102,.3); color:var(--yellow); }
    .lv-3 .step-num { background:rgba(167,139,250,.1); border-color:rgba(167,139,250,.3); color:var(--purple); }
    .lv-4 .step-num { background:rgba(244,114,182,.1); border-color:rgba(244,114,182,.3); color:var(--pink); }

    .step-n { font-family:'Syne', sans-serif; font-weight:800; font-size:1.05rem; line-height:1; }
    .step-s { font-size:8px; opacity:.45; letter-spacing:1px; }

    .step-card {
      flex:1; background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:13px 16px;
      text-decoration:none; color:inherit; display:block;
      transition: all .2s ease; position:relative;
    }
    .step-card::after {
      content:'→'; position:absolute; right:13px; top:50%;
      transform:translateY(-50%) translateX(5px);
      opacity:0; transition:all .2s ease; font-size:13px; color:var(--muted2);
    }
    .step-card:hover { background:var(--s2); transform:translateX(4px); }
    .step-card:hover::after { opacity:1; transform:translateY(-50%) translateX(0); }

    .lv-0 .step-card:hover { border-color:rgba(16,245,160,.3);  box-shadow:-3px 0 0 var(--green); }
    .lv-1 .step-card:hover { border-color:rgba(6,214,245,.3);   box-shadow:-3px 0 0 var(--cyan); }
    .lv-2 .step-card:hover { border-color:rgba(255,209,102,.3); box-shadow:-3px 0 0 var(--yellow); }
    .lv-3 .step-card:hover { border-color:rgba(167,139,250,.3); box-shadow:-3px 0 0 var(--purple); }
    .lv-4 .step-card:hover { border-color:rgba(244,114,182,.3); box-shadow:-3px 0 0 var(--pink); }

    .step-top { display:flex; align-items:center; gap:7px; margin-bottom:4px; }

    .lbl {
      font-family:'JetBrains Mono', monospace; font-size:9px; font-weight:700;
      letter-spacing:2px; text-transform:uppercase; padding:2px 7px; border-radius:4px;
    }
    .lbl-0 { background:rgba(16,245,160,.1);  color:var(--green); }
    .lbl-1 { background:rgba(6,214,245,.1);   color:var(--cyan); }
    .lbl-2 { background:rgba(255,209,102,.1); color:var(--yellow); }
    .lbl-3 { background:rgba(167,139,250,.1); color:var(--purple); }
    .lbl-4 { background:rgba(244,114,182,.1); color:var(--pink); }

    .step-name { font-family:'Syne', sans-serif; font-size:.92rem; font-weight:700; color:var(--text); }
    .step-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .tag {
      font-family:'JetBrains Mono', monospace; font-size:9px; padding:2px 6px;
      border-radius:4px; background:var(--s2); border:1px solid var(--border2); color:var(--muted2);
    }

    /* ── LOADING / ERROR ── */
    .state-msg {
      text-align:center; padding:60px 20px;
      font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--muted2);
    }
    .spinner {
      width:22px; height:22px; margin:0 auto 16px;
      border:2px solid var(--border2); border-top-color:var(--cyan);
      border-radius:50%; animation:spin .7s linear infinite;
    }
    @keyframes spin { to{ transform:rotate(360deg); } }
    .state-msg.err { color:#f87171; }

    /* ── FOOTER ── */
    .footer {
      display:flex; border:1px solid var(--border);
      border-radius:14px; overflow:hidden; margin-top:40px;
    }
    .fstat {
      flex:1; padding:18px 0;
      border-right:1px solid var(--border); text-align:center;
    }
    .fstat:last-child { border-right:none; }
    .fnum { font-family:'Syne', sans-serif; font-size:1.7rem; font-weight:800; line-height:1; }
    .fstat:nth-child(1) .fnum { color:var(--cyan); }
    .fstat:nth-child(2) .fnum { color:var(--purple); }
    .fstat:nth-child(3) .fnum { color:var(--green); }
    .fstat:nth-child(4) .fnum { color:var(--pink); }
    .flbl {
      font-family:'JetBrains Mono', monospace; font-size:8.5px;
      letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:5px;
    }

    @media(max-width:580px){
      .roadmap::before { left:18px; }
      .step-num { width:38px; height:38px; }
      .footer { flex-wrap:wrap; }
      .fstat { flex:1 1 50%; border-bottom:1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="eyebrow">// learning path</div>
    <h1>Apuntes Digitales</h1>
    <p class="header-sub">Abre cada categoría y sigue el orden numerado — de fundamentos a avanzado.</p>
  </header>

  <div id="accordion-wrap">
    <div class="state-msg">
      <div class="spinner"></div>
      Leyendo repositorio...
    </div>
  </div>

  <div class="footer">
    <div class="fstat"><div class="fnum" id="s-notas">—</div><div class="flbl">Notas</div></div>
    <div class="fstat"><div class="fnum" id="s-tracks">—</div><div class="flbl">Tracks</div></div>
    <div class="fstat"><div class="fnum" id="s-carpetas">—</div><div class="flbl">Carpetas</div></div>
    <div class="fstat"><div class="fnum">∞</div><div class="flbl">En progreso</div></div>
  </div>

</div>
<script>
/* ══════════════════════════════════════════════════════════════
   AUTO-DESCUBRIMIENTO
   Lee window.location → sabe usuario y repo sin tocar el código.

   GitHub Pages:  fjuribe.github.io/apuntes-digitales/
     hostname  →  fjuribe.github.io   → user = "fjuribe"
     pathname  →  /apuntes-digitales/ → repo = "apuntes-digitales"

   Si el repo ES el sitio raíz (fjuribe.github.io sin subpath):
     pathname  →  /                   → repo = "fjuribe.github.io"

   Desarrollo local: fallback al valor de LOCAL_FALLBACK.
══════════════════════════════════════════════════════════════ */
const LOCAL_FALLBACK = 'fjuribe/apuntes-digitales'; // solo para localhost

function detectRepo() {
  const host = window.location.hostname;
  const path = window.location.pathname;

  if (host.endsWith('.github.io')) {
    const user    = host.replace('.github.io', '');
    const segment = path.split('/').filter(Boolean)[0];
    const repo    = segment || `${user}.github.io`;
    return { user, repo, id: `${user}/${repo}` };
  }

  // localhost / desarrollo
  const [user, repo] = LOCAL_FALLBACK.split('/');
  return { user, repo, id: LOCAL_FALLBACK };
}

/* ══════════════════════════════════════════════════════════════
   ICONOS POR NOMBRE DE CARPETA
   Añade los nombres que uses en tu repo (minúsculas, sin números).
══════════════════════════════════════════════════════════════ */
const ICONS = {
  tryhackme:    { icon:'🛡️',  sub:'hacking · ctf · retos' },
  redes:        { icon:'🌐',  sub:'redes · protocolos · fundamentos' },
  networking:   { icon:'🌐',  sub:'redes · protocolos' },
  criptografia: { icon:'🔐',  sub:'cifrado · claves · PKI' },
  crypto:       { icon:'🔐',  sub:'cifrado · hashes' },
  iaengineer:   { icon:'🧠',  sub:'llm · langchain · ai apps' },
  ia:           { icon:'🧠',  sub:'inteligencia artificial' },
  langchain:    { icon:'⛓️', sub:'langchain · rag · llm' },
  rag:          { icon:'🔍',  sub:'retrieval augmented generation' },
  web:          { icon:'💻',  sub:'html · css · javascript' },
  python:       { icon:'🐍',  sub:'python · scripts' },
  linux:        { icon:'🐧',  sub:'linux · terminal · comandos' },
  docker:       { icon:'🐳',  sub:'containers · devops' },
  git:          { icon:'📦',  sub:'control de versiones' },
  sql:          { icon:'🗄️', sub:'bases de datos · queries' },
  seguridad:    { icon:'🔒',  sub:'cybersecurity · pentesting' },
  guias:        { icon:'📖',  sub:'cheatsheets · referencia' },
  _default:     { icon:'📁',  sub:'módulos · apuntes' },
};

const COLORS  = ['cyan','purple','pink','green','yellow'];
const LABELS  = ['EMPIEZA AQUÍ','FUNDAMENTOS','INTERMEDIO','AVANZADO','REFERENCIA'];

/* ══════════════════════════════════════════════════════════════
   MAIN — se ejecuta solo, sin intervención del usuario
══════════════════════════════════════════════════════════════ */
(async () => {
  const { user, repo, id } = detectRepo();
  const baseURL = repo === `${user}.github.io`
    ? `https://${user}.github.io`
    : `https://${user}.github.io/${repo}`;

  let tree;
  try {
    tree = await fetchTree(id);
  } catch {
    err(`No se pudo leer <strong>${id}</strong>. Verifica que el repositorio sea público.`);
    return;
  }

  const structure = parse(tree);

  if (!structure.size) {
    err('No se encontraron archivos <code>.html</code> en subcarpetas del repositorio.');
    return;
  }

  render(structure, baseURL);
})();

/* ══════════════════════════════════════════════════════════════
   GITHUB TREE API
══════════════════════════════════════════════════════════════ */
async function fetchTree(id) {
  for (const branch of ['main', 'master']) {
    const r = await fetch(
      `https://api.github.com/repos/${id}/git/trees/${branch}?recursive=1`,
      { headers: { Accept: 'application/vnd.github.v3+json' } }
    );
    if (r.ok) return (await r.json()).tree || [];
  }
  throw new Error('no branch');
}

/* ══════════════════════════════════════════════════════════════
   PARSE — árbol plano → Map<track, Map<subfolder, files[]>>
══════════════════════════════════════════════════════════════ */
function parse(tree) {
  const files = tree.filter(n =>
    n.type === 'blob' &&
    n.path.endsWith('.html') &&
    n.path !== 'index.html' &&
    !n.path.startsWith('.')
  );

  const map = new Map();

  for (const node of files) {
    const parts  = node.path.split('/');
    if (parts.length < 2) continue;

    const track  = parts[0];
    const fname  = parts.at(-1);
    const folder = parts.length === 2 ? '__root__' : parts.slice(1, -1).join('/');

    if (!map.has(track))               map.set(track, new Map());
    if (!map.get(track).has(folder))   map.get(track).set(folder, []);
    map.get(track).get(folder).push({ path: node.path, name: fname });
  }

  // Orden natural dentro de cada carpeta
  for (const [, folders] of map)
    for (const [, arr] of folders)
      arr.sort((a,b) => a.name.localeCompare(b.name, undefined, { numeric:true, sensitivity:'base' }));

  return map;
}

/* ══════════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════════ */
function render(structure, baseURL) {
  const wrap = document.getElementById('accordion-wrap');
  const acc  = document.createElement('div');
  acc.className = 'accordion';

  let totalNotas = 0, totalCarpetas = 0, trackIdx = 0;

  for (const [trackName, folders] of structure) {
    const color   = COLORS[trackIdx % COLORS.length];
    const meta    = getMeta(trackName);
    const trackId = 'tr-' + trackName.replace(/[^a-z0-9]/gi,'-');

    let countFiles = 0;
    for (const [, f] of folders) countFiles += f.length;
    totalNotas += countFiles;

    const subKeys = [...folders.keys()].filter(k => k !== '__root__');
    totalCarpetas += subKeys.length || 1;

    // Construir interior
    let inner = '';
    const root = folders.get('__root__') || [];
    if (root.length) inner += roadmap(root, baseURL);

    for (const [key, files] of folders) {
      if (key === '__root__') continue;
      const subMeta = getMeta(key.split('/').pop());
      inner += `<div class="subfolder-label">${subMeta.icon} ${humanize(key.split('/').pop())}</div>`;
      inner += roadmap(files, baseURL);
    }

    const item = document.createElement('div');
    item.className = `acc-item color-${color}`;
    item.id        = trackId;
    item.style.animationDelay = `${trackIdx * 0.07}s`;
    item.innerHTML = `
      <button class="acc-trigger" onclick="tog('${trackId}')">
        <div class="acc-icon">${meta.icon}</div>
        <div class="acc-meta">
          <div class="acc-title">${humanize(trackName)}</div>
          <div class="acc-subtitle">${meta.sub}</div>
        </div>
        <div class="acc-right">
          <span class="acc-count">${countFiles} ${countFiles===1?'nota':'notas'}</span>
          <div class="acc-chevron">▼</div>
        </div>
      </button>
      <div class="acc-body">
        <div class="acc-inner">${inner}</div>
      </div>`;

    acc.appendChild(item);
    trackIdx++;
  }

  wrap.innerHTML = '';
  wrap.appendChild(acc);

  document.getElementById('s-notas').textContent    = pad(totalNotas);
  document.getElementById('s-tracks').textContent   = pad(trackIdx);
  document.getElementById('s-carpetas').textContent = pad(totalCarpetas);
}

function roadmap(files, baseURL) {
  return `<div class="roadmap">${files.map((f, i) => {
    const lv    = Math.min(i, 4);
    const label = LABELS[Math.min(i, LABELS.length-1)];
    return `
      <div class="step lv-${lv}">
        <div class="step-num"><span class="step-s">PASO</span><span class="step-n">${i+1}</span></div>
        <a class="step-card" href="${baseURL}/${f.path}" target="_blank" rel="noopener">
          <div class="step-top"><span class="lbl lbl-${lv}">${label}</span></div>
          <div class="step-name">${humanizeFile(f.name)}</div>
          <div class="step-tags">${tags(f.name)}</div>
        </a>
      </div>`;
  }).join('')}</div>`;
}

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function getMeta(name) {
  const k = name.toLowerCase().replace(/[\d._\- ]/g,'');
  if (ICONS[k]) return ICONS[k];
  for (const [key, val] of Object.entries(ICONS)) {
    if (key === '_default') continue;
    if (k.includes(key) || key.includes(k)) return val;
  }
  return ICONS._default;
}

function humanize(raw) {
  return raw.replace(/^\d+[._-]/,'').replace(/[-_]/g,' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function humanizeFile(raw) {
  return raw.replace(/\.html$/,'').replace(/^\d+[._-]/,'')
    .replace(/[-_]/g,' ').replace(/\b\w/g, c => c.toUpperCase());
}

function tags(name) {
  return name.replace(/\.html$/,'').replace(/^\d+[._-]/,'')
    .split(/[-_.]/).filter(w => w.length > 2).slice(0,4)
    .map(w => `<span class="tag">${w}</span>`).join('');
}

function pad(n) { return String(n).padStart(2,'0'); }

function err(msg) {
  document.getElementById('accordion-wrap').innerHTML =
    `<div class="state-msg err">⚠ ${msg}</div>`;
}

function tog(id) {
  const el = document.getElementById(id);
  const open = el.classList.contains('open');
  document.querySelectorAll('.acc-item').forEach(e => e.classList.remove('open'));
  if (!open) el.classList.add('open');
}
</script>
</body>
</html>
